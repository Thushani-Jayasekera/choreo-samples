openapi: 3.0.1
info:
  title: Readinglist
  version: 0.1.0
servers:
- url: "{server}:{port}/readinglist"
  variables:
    server:
      default: http://localhost
    port:
      default: "9090"
paths:
  /booksaddition:
    get:
      operationId: getBooks
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
        "400":
          description: BadRequest
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
  /books:
    get:
      operationId: getBooks
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
        "400":
          description: BadRequest
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
    post:
      operationId: postBooks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookItem'
      responses:
        "201":
          description: Created
        "400":
          description: BadRequest
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
    delete:
      operationId: deleteBooks
      parameters:
      - name: id
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Ok
        "400":
          description: BadRequest
        "202":
          description: Accepted
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
  /books/{bookId}:
    get:
      operationId: getBooksBookid
      parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: string
      responses:
        "404":
          description: NotFound
        "400":
          description: BadRequest
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
components:
  schemas:
    ErrorPayload:
      type: object
      properties:
        reason:
          type: string
          description: Reason phrase
        path:
          type: string
          description: Request path
        method:
          type: string
          description: Method type of the request
        message:
          type: string
          description: Error message
        timestamp:
          type: string
          description: Timestamp of the error
        status:
          type: integer
          description: Relevant HTTP status code
          format: int32
    Book:
      allOf:
      - $ref: '#/components/schemas/BookItem'
      - required:
        - id
        type: object
        properties:
          id:
            type: string
    BookItem:
      required:
      - author
      - status
      - title
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        status:
          type: string
